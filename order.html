<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Orders - Admin</title>

  <!-- LINK YOUR EXISTING CSS -->
  <link rel="stylesheet" href="admin.css">

  <style>
    /* PAGE BACKGROUND */
    body {
    background-color: #c9ada7;
  min-height: 100vh;
  
  font-family: Arial, sans-serif;
  padding: 20px;
}

    /* HEADER */
    .header {
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    /* CONTAINER */
    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    /* ORDER CARD */
    .order-card {
      background-color: #9a8c98;
      padding: 15px;
      margin: 15px 0;
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }

    .order-card h3 {
      margin-bottom: 5px;
    }

    .order-card ul {
      padding-left: 20px;
      margin: 10px 0;
    }

    .order-card li {
      font-size: 14px;
    }

    /* TOTAL */
    .order-card b {
      color: #ffd369;
    }

    /* BACK BUTTON */
    .back-btn {
      display: inline-block;
      margin-bottom: 15px;
      padding: 8px 15px;
      border-radius: 20px;
      background: white;
      color: #ff4d4d;
      text-decoration: none;
      font-weight: bold;
    }

    .back-btn:hover {
      transform: scale(1.05);
    }

    #searchOrder {
  width: 300px;
  display: block;
  margin: 10px auto 20px;
  padding: 10px 15px;
  border-radius: 20px;
  border: none;
  outline: none;
  background: #f2e9e4;
}
  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    📦 All Orders
  </div>

  <!-- MAIN -->
  <div class="container">

    <!-- BACK BUTTON -->
    <a href="admin.html" class="back-btn">⬅ Back to Admin</a>

    <!-- ORDER LIST -->
     <input type="text" id="searchOrder" placeholder="🔍 Search by name, email, phone, date..." />
    <div id="orderList">
      <!-- Orders will load here -->
    </div>

  </div>

  <!-- JS FILE -->
  <script type="module" src="order.js"></script>

</body>
</html>
